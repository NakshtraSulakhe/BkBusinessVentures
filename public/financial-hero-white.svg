<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="800" height="600" fill="#ffffff"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    
    <!-- Gradient Definitions -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Grid -->
  <rect width="800" height="600" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Floating Elements -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="50" fill="#3b82f6">
      <animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="500" r="30" fill="#10b981">
      <animate attributeName="cy" values="500;480;500" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="150" r="40" fill="#8b5cf6">
      <animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main Financial Cards -->
  <g transform="translate(100, 200)">
    <!-- RD Card -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="120" rx="12" fill="url(#blueGradient)" opacity="0.9">
        <animate attributeName="y" values="0;-5;0" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="90" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Recurring Deposit</text>
      <text x="90" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">8.5% p.a.</text>
      <text x="90" y="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Min. ₹500</text>
      <rect x="20" y="90" width="140" height="4" rx="2" fill="white" opacity="0.3"/>
      <rect x="20" y="90" width="100" height="4" rx="2" fill="white">
        <animate attributeName="width" values="0;100;0" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- FD Card -->
    <g transform="translate(210, 20)">
      <rect x="0" y="0" width="180" height="120" rx="12" fill="url(#greenGradient)" opacity="0.9">
        <animate attributeName="y" values="20;15;20" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <text x="90" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Fixed Deposit</text>
      <text x="90" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">7.2% p.a.</text>
      <text x="90" y="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Min. ₹1,000</text>
      <rect x="20" y="90" width="140" height="4" rx="2" fill="white" opacity="0.3"/>
      <rect x="20" y="90" width="120" height="4" rx="2" fill="white">
        <animate attributeName="width" values="0;120;0" dur="2.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Loan Card -->
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="180" height="120" rx="12" fill="url(#purpleGradient)" opacity="0.9">
        <animate attributeName="y" values="0;-8;0" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text x="90" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Personal Loan</text>
      <text x="90" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">10.5% p.a.</text>
      <text x="90" y="80" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Up to ₹10L</text>
      <rect x="20" y="90" width="140" height="4" rx="2" fill="white" opacity="0.3"/>
      <rect x="20" y="90" width="80" height="4" rx="2" fill="white">
        <animate attributeName="width" values="0;80;0" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Growth Chart -->
  <g transform="translate(100, 380)">
    <text x="0" y="0" fill="#1f2937" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Investment Growth</text>
    <polyline points="0,50 50,40 100,30 150,35 200,20 250,10 300,15 350,5 400,0" 
              fill="none" stroke="url(#blueGradient)" stroke-width="3" opacity="0.8">
      <animate attributeName="stroke-dasharray" values="0 600;600 0" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <!-- Data Points -->
    <circle cx="0" cy="50" r="4" fill="#3b82f6">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="30" r="4" fill="#3b82f6">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="20" r="4" fill="#3b82f6">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="15" r="4" fill="#3b82f6">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="0" r="4" fill="#3b82f6">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating Coins -->
  <g>
    <g transform="translate(650, 200)">
      <circle cx="0" cy="0" r="20" fill="url(#orangeGradient)" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">₹</text>
    </g>
    <g transform="translate(700, 280)">
      <circle cx="0" cy="0" r="15" fill="url(#orangeGradient)" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="4" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">₹</text>
    </g>
    <g transform="translate(620, 320)">
      <circle cx="0" cy="0" r="18" fill="url(#orangeGradient)" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">₹</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.2">
    <rect x="50" y="50" width="100" height="2" fill="#3b82f6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="650" y="100" width="80" height="2" fill="#10b981">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="500" width="120" height="2" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Title Text -->
  <text x="400" y="80" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="32" font-weight="bold">
    Smart Financial Management
  </text>
  <text x="400" y="110" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="18">
    Manage your wealth with confidence
  </text>
</svg>
