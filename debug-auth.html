<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .token-info { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .success { background: #e8f5e8; color: #2e7d32; padding: 15px; border-radius: 8px; margin: 10px 0; }
        button { background: #1976d2; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #1565c0; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Authentication Debug Tool</h1>
    
    <div class="token-info">
        <h3>Current Token from localStorage:</h3>
        <pre id="token-display">Loading...</pre>
    </div>

    <div>
        <button onclick="testAuth()">Test Authentication</button>
        <button onclick="clearToken()">Clear Token</button>
        <button onclick="goToLogin()">Go to Login</button>
    </div>

    <div id="result"></div>

    <script>
        function displayToken() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('auth_user');
            document.getElementById('token-display').textContent = token ? 
                `Token: ${token.substring(0, 50)}...\nUser: ${user}` : 
                'No token found';
        }

        async function testAuth() {
            const token = localStorage.getItem('auth_token');
            const resultDiv = document.getElementById('result');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="error">No auth token found. Please log in first.</div>';
                return;
            }

            try {
                const response = await fetch('http://localhost:3001/api/debug/auth', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>Authentication Successful!</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>Authentication Failed (${response.status})</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>Network Error</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        function clearToken() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('auth_user');
            displayToken();
            document.getElementById('result').innerHTML = '<div class="success">Token cleared!</div>';
        }

        function goToLogin() {
            window.location.href = 'http://localhost:3001/login';
        }

        // Initial display
        displayToken();
    </script>
</body>
</html>
